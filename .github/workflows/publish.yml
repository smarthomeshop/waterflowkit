name: Build and Publish WaterFlowKit firmware

on:
  pull_request:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force build all versions"
        required: false
        type: boolean
        default: false
  # Scheduled build: rebuild all firmware monthly with latest ESPHome.
  # ESPHome releases typically land around the 15th, so we rebuild on the
  # 20th to pick up the new release a few days later after initial fixes.
  schedule:
    - cron: "0 3 20 * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "waterflowkit-v1/**"
      - "waterflowkit-v2/**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect changed versions
    runs-on: ubuntu-latest
    outputs:
      v1_changed: ${{ steps.changes.outputs.v1 }}
      v2_changed: ${{ steps.changes.outputs.v2 }}
      v1_version: ${{ steps.versions.outputs.v1_version }}
      v2_version: ${{ steps.versions.outputs.v2_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes in each version
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_all }}" == "true" ]]; then
            echo "Force building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Scheduled build - rebuilding all versions with latest ESPHome"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Tag detected, building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push detected, building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^.github/workflows/"; then
            echo "Workflow changes detected, rebuilding all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          V1_CHANGED=$(echo "$CHANGED_FILES" | grep -q "^waterflowkit-v1/" && echo "true" || echo "false")
          V2_CHANGED=$(echo "$CHANGED_FILES" | grep -q "^waterflowkit-v2/" && echo "true" || echo "false")

          echo "v1=$V1_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v2=$V2_CHANGED" >> "$GITHUB_OUTPUT"
          echo "V1 changed: $V1_CHANGED"
          echo "V2 changed: $V2_CHANGED"

      - name: Update version numbers for changed versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          IS_SCHEDULED="${{ github.event_name == 'schedule' }}"

          update_version() {
            local version_file=$1
            local output_name=$2

            if [[ ! -f "$version_file" ]]; then
              echo "${output_name}=1.0" >> "$GITHUB_OUTPUT"
              return
            fi

            current_version=$(grep "software_version:" "$version_file" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            echo "Current version for $version_file: $current_version"

            if [[ "$IS_SCHEDULED" == "true" ]]; then
              echo "${output_name}=${current_version}" >> "$GITHUB_OUTPUT"
              echo "Scheduled build - keeping version: $current_version"
              return
            fi

            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
              new_version="${GITHUB_REF_NAME#v}"
            else
              if [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)(.*)$ ]]; then
                major="${BASH_REMATCH[1]}"
                minor="${BASH_REMATCH[2]}"
                suffix="${BASH_REMATCH[3]}"
                new_minor=$((minor + 1))
                new_version="${major}.${new_minor}${suffix}"
              else
                shortsha=$(echo "${GITHUB_SHA}" | cut -c1-7)
                new_version="dev-${shortsha}"
              fi
            fi

            echo "${output_name}=${new_version}" >> "$GITHUB_OUTPUT"
            echo "New version for $version_file: $new_version"
          }

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            update_version "waterflowkit-v1/base.yaml" "v1_version"
          else
            v1_current=$(grep "software_version:" "waterflowkit-v1/base.yaml" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v1_version=$v1_current" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            update_version "waterflowkit-v2/base.yaml" "v2_version"
          else
            v2_current=$(grep "software_version:" "waterflowkit-v2/base.yaml" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v2_version=$v2_current" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version updates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          changes_made=false

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            sed -i "s/^\s*software_version: \".*\"/  software_version: \"${{ steps.versions.outputs.v1_version }}\"/" waterflowkit-v1/base.yaml
            changes_made=true
          fi

          if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            sed -i "s/^\s*software_version: \".*\"/  software_version: \"${{ steps.versions.outputs.v2_version }}\"/" waterflowkit-v2/base.yaml
            changes_made=true
          fi

          if [[ "$changes_made" == "true" ]] && ! git diff --quiet; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add waterflowkit-v*/base.yaml

            msg="chore: update versions"
            [[ "${{ steps.changes.outputs.v1 }}" == "true" ]] && msg="$msg V1=${{ steps.versions.outputs.v1_version }}"
            [[ "${{ steps.changes.outputs.v2 }}" == "true" ]] && msg="$msg V2=${{ steps.versions.outputs.v2_version }}"
            msg="$msg [skip ci]"

            git commit -m "$msg" || exit 0
            git push || echo "Nothing to push"
          fi

  build-v1-wifi:
    name: Build WaterFlowKit V1 WiFi
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v1/waterflowkit-wifi.yaml
      name: WaterFlowKit V1 WiFi
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v1-wifi
      software_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: waterflowkit-v1

  build-v1-wifi-cloud:
    name: Build WaterFlowKit V1 WiFi Cloud
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v1/waterflowkit-wifi-cloud.yaml
      name: WaterFlowKit V1 WiFi Cloud
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v1-wifi-cloud
      software_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: waterflowkit-v1

  build-v2-wifi:
    name: Build WaterFlowKit V2 WiFi
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v2/waterflowkit-wifi.yaml
      name: WaterFlowKit V2 WiFi
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v2-wifi
      software_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: waterflowkit-v2

  build-v2-wifi-cloud:
    name: Build WaterFlowKit V2 WiFi Cloud
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v2/waterflowkit-wifi-cloud.yaml
      name: WaterFlowKit V2 WiFi Cloud
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v2-wifi-cloud
      software_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: waterflowkit-v2

  build-v2-ethernet:
    name: Build WaterFlowKit V2 Ethernet
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v2/waterflowkit-ethernet.yaml
      name: WaterFlowKit V2 Ethernet
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v2-ethernet
      software_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: waterflowkit-v2

  build-v2-ethernet-cloud:
    name: Build WaterFlowKit V2 Ethernet Cloud
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_changed == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: waterflowkit-v2/waterflowkit-ethernet-cloud.yaml
      name: WaterFlowKit V2 Ethernet Cloud
      clean: false
      esphome_version: latest
      directory_name: waterflowkit-v2-ethernet-cloud
      software_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: waterflowkit-v2

  publish-gh-pages:
    name: Publish firmware to GitHub Pages
    needs:
      - detect-changes
      - build-v1-wifi
      - build-v1-wifi-cloud
      - build-v2-wifi
      - build-v2-wifi-cloud
      - build-v2-ethernet
      - build-v2-ethernet-cloud
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.build-v1-wifi.result == 'success' ||
        needs.build-v1-wifi-cloud.result == 'success' ||
        needs.build-v2-wifi.result == 'success' ||
        needs.build-v2-wifi-cloud.result == 'success' ||
        needs.build-v2-ethernet.result == 'success' ||
        needs.build-v2-ethernet-cloud.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p output

      - name: Download V1 WiFi artifact
        if: needs.build-v1-wifi.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V1 WiFi
          path: output

      - name: Download V1 WiFi Cloud artifact
        if: needs.build-v1-wifi-cloud.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V1 WiFi Cloud
          path: output

      - name: Download V2 WiFi artifact
        if: needs.build-v2-wifi.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V2 WiFi
          path: output

      - name: Download V2 WiFi Cloud artifact
        if: needs.build-v2-wifi-cloud.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V2 WiFi Cloud
          path: output

      - name: Download V2 Ethernet artifact
        if: needs.build-v2-ethernet.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V2 Ethernet
          path: output

      - name: Download V2 Ethernet Cloud artifact
        if: needs.build-v2-ethernet-cloud.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterFlowKit V2 Ethernet Cloud
          path: output

      - name: Create manifests
        shell: bash
        run: |
          set -euo pipefail

          create_manifest() {
            local variant_dir=$1
            local manifest_name=$2
            local display_name=$3
            local version=$4
            local manifest_file="output/${variant_dir}/manifest.json"

            if [[ ! -f "$manifest_file" ]]; then
              echo "Skipping ${variant_dir}; manifest.json not found"
              return
            fi

            jq --arg dir "$variant_dir" --arg name "$display_name" --arg version "$version" '{
              "name": $name,
              "version": $version,
              "home_assistant_domain": "esphome",
              "new_install_skip_erase": false,
              "builds": [.]
            } |
            .builds[0].ota.path = ($dir + "/" + .builds[0].ota.path) |
            .builds[0].parts[].path = ($dir + "/" + .builds[0].parts[].path)' \
              "$manifest_file" > "output/${manifest_name}"
          }

          create_manifest "waterflowkit-v1-wifi" "waterflowkit-v1-wifi-manifest.json" "WaterFlowKit V1 WiFi" "${{ needs.detect-changes.outputs.v1_version }}"
          create_manifest "waterflowkit-v1-wifi-cloud" "waterflowkit-v1-wifi-cloud-manifest.json" "WaterFlowKit V1 WiFi Cloud" "${{ needs.detect-changes.outputs.v1_version }}"
          create_manifest "waterflowkit-v2-wifi" "waterflowkit-v2-wifi-manifest.json" "WaterFlowKit V2 WiFi" "${{ needs.detect-changes.outputs.v2_version }}"
          create_manifest "waterflowkit-v2-wifi-cloud" "waterflowkit-v2-wifi-cloud-manifest.json" "WaterFlowKit V2 WiFi Cloud" "${{ needs.detect-changes.outputs.v2_version }}"
          create_manifest "waterflowkit-v2-ethernet" "waterflowkit-v2-ethernet-manifest.json" "WaterFlowKit V2 Ethernet" "${{ needs.detect-changes.outputs.v2_version }}"
          create_manifest "waterflowkit-v2-ethernet-cloud" "waterflowkit-v2-ethernet-cloud-manifest.json" "WaterFlowKit V2 Ethernet Cloud" "${{ needs.detect-changes.outputs.v2_version }}"

      - name: Create README for gh-pages
        shell: bash
        run: |
          cat > output/README.md <<'EOF'
          # WaterFlowKit firmware – GitHub Pages branch (gh-pages)

          This branch hosts the public firmware artifacts and manifests for WaterFlowKit.
          It is served via GitHub Pages and is intended to be consumed by:
          - ESP Web Tools (browser-based flashing)
          - OTA update integrations (using the JSON manifest)

          ## Do not edit manually
          Files in this branch are generated by the CI workflow in the default branch.
          Any manual changes will be overwritten on the next publish.

          ## Layout
          - `waterflowkit-v1-wifi/`
          - `waterflowkit-v1-wifi-cloud/`
          - `waterflowkit-v2-wifi/`
          - `waterflowkit-v2-wifi-cloud/`
          - `waterflowkit-v2-ethernet/`
          - `waterflowkit-v2-ethernet-cloud/`
          - `*-manifest.json` aggregate manifests for OTA and ESP Web Tools
          EOF

      - name: Debug output structure
        run: find output -maxdepth 2 -type f | sort

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: output
          clean: false
          force: false
          attempt-limit: 6
