# WaterFlowKit V2 Ethernet + SmartHomeShop App (cloud) Configuration
# Main entry point for Ethernet firmware with cloud sync enabled

substitutions:
  default_network: "Ethernet + SmartHomeShop App (cloud)"

packages:
  base: !include base.yaml
  eth: !include eth.yaml
  cloud: !include cloud.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterflowkit/waterflowkit-v2/waterflowkit-ethernet-cloud.yaml@main
  import_full_config: false
