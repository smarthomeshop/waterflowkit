# WaterFlowKit V2 - Ethernet Network Configuration
# Uses W5500 SPI Ethernet module

# Ethernet Power Switch - must be enabled for W5500 to work
switch:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true  # LOW = ON
    id: eth_power
    name: "Ethernet Power"
    restore_mode: ALWAYS_ON  # Enable power at boot
    internal: true

ethernet:
  type: W5500
  clk_pin: GPIO20
  mosi_pin: GPIO18
  miso_pin: GPIO19
  cs_pin: GPIO21
  interrupt_pin: GPIO12
  reset_pin: GPIO13

text_sensor:
  - platform: ethernet_info
    ip_address:
      id: ethernet_ip_address
      name: "${friendly_name} IP Address"

  # Dummy sensors for cloud.yaml compatibility (wifi variant uses these IDs)
  - platform: template
    id: wifi_ip_address
    internal: true

  - platform: template
    id: wifi_mac_address
    internal: true
    lambda: |-
      // Ethernet has no wifi_mac_address, use ethernet MAC
      uint8_t mac[6];
      esp_read_mac(mac, ESP_MAC_ETH);
      char macStr[18];
      snprintf(macStr, sizeof(macStr), "%02X:%02X:%02X:%02X:%02X:%02X",
               mac[0], mac[1], mac[2], mac[3], mac[4], mac[5]);
      return std::string(macStr);
