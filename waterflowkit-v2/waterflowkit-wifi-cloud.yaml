# WaterFlowKit V2 WiFi Cloud Configuration
# Main entry point for WiFi firmware with cloud sync enabled

substitutions:
  default_network: "WiFi Cloud"

packages:
  base: !include base.yaml
  wifi: !include wifi.yaml
  cloud: !include cloud.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterflowkit/waterflowkit-v2/waterflowkit-wifi-cloud.yaml@main
