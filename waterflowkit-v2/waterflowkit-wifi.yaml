# WaterFlowKit V2 WiFi Configuration
# Main entry point for WiFi firmware
# ESP32-C6 with built-in WiFi

substitutions:
  default_network: "WiFi (local)"

packages:
  base: !include base.yaml
  wifi: !include wifi.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterflowkit/waterflowkit-v2/waterflowkit-wifi.yaml@main
  import_full_config: false
